[workspace]
channels = ["https://prefix.dev/conda-forge", "https://prefix.dev/robostack-humble"]
platforms = ["linux-aarch64", "osx-arm64", "linux-64", "win-64"]

[tasks]
segment = "python segment_webcam.py"
pose = "python pose_cv2.py"
pose-ros2 = "python pose_ros2.py"

[system-requirements]
cuda = "12.9"
libc = "2.34"

[target.linux-aarch64.dependencies]
pytorch-gpu = "2.10.*"
arm-variant = { version = "*", build = "tegra"}
torchvision = { version = "==0.25.0", build-number = "5"}

[dependencies]
opencv = "*"
torchvision = "==0.25.0"
ultralytics = ">=8.4.36,<9"
ros-humble-rclpy = "*"
ros-humble-sensor-msgs = "*"
ros-humble-cv-bridge = "*"
ros-humble-rviz2 = ">=11.2.25,<12"

